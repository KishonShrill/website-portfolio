<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="index.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>

  <main class="preview-card">
    <img class="preview-card__banner" src="./assets/images/illustration-article.svg" alt="Preview Card Banner">
    <mark class="preview-card__tag">Learning</mark>
    <p class="preview-card__published-date">Published 21 Dec 2023</p>
    <h1 class="preview-card__title">HTML & CSS foundations</h1>
    <p class="preview-card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    <div>
      <img class="preview-card__profile" src="./assets/images/image-avatar.webp" alt="Author Profile Picture">
      <p class="preview-card__author">Greg Hooper</p>
    </div>
  </main>
  
  <footer class="attribution web">
    <div>
      <p>Challenge by <a class="mentor" href="https://www.frontendmentor.io/challenges/age-calculator-app-dF9DFFpj-Q/hub" target="_blank"> Frontend Mentor</a>. 
      Coded by <a href="https://github.com/KishonShrill"> Chriscent Pingol</a>.</p>
    </div>
  
    <p>Go back <a href="../../index.html"> Home</a>.</p>
  </footer>
</body>
</html>
