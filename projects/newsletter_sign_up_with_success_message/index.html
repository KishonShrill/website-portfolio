<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="stylesheet" href="./assets/styles/utils.css">
    <link rel="stylesheet" href="./assets/styles/style.css">
    <script type="module" src="./index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <title>Frontend Mentor | Newsletter sign-up form with success message</title>
  </head>
  <body>

    <main class="sign-up-wrapper">
      <!-- Sign-up form start -->
      <section class="sign-up__container description">
        <h1 class="description__title">Stay updated!</h1>
        <p class="description__subtitle">Join 60,000+ product managers receiving monthly updates on:</p>
        <ul class="description__list">
          <li>Product discovery and building what matters</li>
          <li>Measuring to ensure updates are a success</li>
          <li>And much more!</li>
        </ul>
        <div class="sign-up__info">
          <p class="sign-up__input-legend">Email address</p>
          <p class="sign-up__input-legend sign-up__warning"></p>
        </div>
        <input 
          class="sign-up__input"
          type="email" 
          id="email" 
          name="mail" 
          placeholder="email@company.com"
        >
        <input 
          class="sign-up__btn"
          type="submit"
          value="Subscribe to monthly newsletter"
        ></input>
      </section>
      
    </main>
    
    <footer class="attribution">
      <div>
        <p class="web">Challenge by <a class="mentor" href="https://www.frontendmentor.io?ref=challenge" target="_blank"> Frontend Mentor</a>. 
        Coded by <a href="https://github.com/KishonShrill"> Chriscent Pingol</a>.</p>
      </div>

      <p class="web">Go back <a href="../../index.html"> Home</a>.</p>
    </footer>
  </body>
</html>
