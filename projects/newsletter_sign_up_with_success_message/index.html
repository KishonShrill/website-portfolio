<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="stylesheet" href="utils.css">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Newsletter sign-up form with success message</title>
  </head>
  <body>

    <main class="sign-up-wrapper">
      <!-- Sign-up form start -->
      <section class="sign-up__container description">
        <h1 class="description__title">Stay updated!</h1>
        <p class="description__subtitle">Join 60,000+ product managers receiving monthly updates on:</p>
        <ul class="description__list">
          <li>Product discovery and building what matters</li>
          <li>Measuring to ensure updates are a success</li>
          <li>And much more!</li>
        </ul>
        <p class="sign-up__input-legend">Email address</p>
        <input class="sign-up__input" type="email" name="" id="" placeholder="email@company.com">
        <button class="sign-up__btn">Subscribe to monthly newsletter</button>
      </section>

      <section class="sign-up__container"></section>
    </main>

    <!-- Sign-up form end -->

    <!-- Success message start -->

    <!-- Thanks for subscribing!

    A confirmation email has been sent to ash@loremcompany.com. 
    Please open it and click the button inside to confirm your subscription.

    Dismiss message

    Success message end -->
    
    <footer class="attribution">
      <div>
        <p class="web">Challenge by <a class="mentor" href="https://www.frontendmentor.io?ref=challenge" target="_blank"> Frontend Mentor</a>. 
        Coded by <a href="https://github.com/KishonShrill"> Chriscent Pingol</a>.</p>
      </div>

      <p class="web">Go back <a href="../../index.html"> Home</a>.</p>
    </footer>
  </body>
</html>
