<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="stylesheet" href="index.css">

    <title>Frontend Mentor | Profile card component</title>

  </head>
  <body>

    <span class="bg-pattern-top"></span>
    <main class="profile__card">
      <span role="banner" class="profile__banner"></span>
      <img class="profile__picture" src="./images/image-victor.jpg" alt="Profile Picture">
      <h1 class="profile__name"><span>Victor Crest</span><span class="profile__age">26</span></h1>
      <h2 class="profile__location">London</h2>
      <hr class="profile__divider" />
      <section class="profile__info">
        <div>
          <h1 class="profile__stats">80K</h1>
          <h2 class="profile__stat-info">Followers</h2>
        </div>
        <div>
          <h1 class="profile__stats">803K</h1>
          <h2 class="profile__stat-info">Likes</h2>
        </div>
        <div>
          <h1 class="profile__stats">1.4K</h1>
          <h2 class="profile__stat-info">Photos</h2>
        </div>
      </section>
      
    </main>
    <span class="bg-pattern-bottom"></span>
    
    <footer class="attribution web">
      <div>
        <p>Challenge by <a class="mentor" href="https://www.frontendmentor.io/challenges/age-calculator-app-dF9DFFpj-Q/hub" target="_blank"> Frontend Mentor</a>. 
        Coded by <a href="https://github.com/KishonShrill"> Chriscent Pingol</a>.</p>
      </div>
    
      <p>Go back <a href="../../index.html"> Home</a>.</p>
    </footer>
  </body>
</html>
