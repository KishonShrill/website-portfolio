    <title>Frontend Mentor | Calculator app</title>
    <script type="module" crossorigin src="/website-portfolio/assets/calculator_app-e913924c.js"></script>

  <body>

    <main>
      <header>

        <p class="header__logo">calc</p>
        <div class="header__theme-container">
          <p class="header__theme">THEME</p>
          <div class="theme-toggle">
            <label class="custom-radio-button">
              <input id="first" name="toggle-state" type="radio" value="first" />
              <span class="checkmark"></span>
            </label>
            <label class="custom-radio-button">
              <input id="second" name="toggle-state" type="radio" value="second" />
              <span class="checkmark"></span>
            </label>
            <label class="custom-radio-button">
              <input id="third" name="toggle-state" type="radio" value="third" />
              <span class="checkmark"></span>
            </label>
          </div>
        </div>        
      </header>

      <input type="text" class="screen" name="display"></input>

      <section class="numpad">
        <div><button 
          id="keys"
          class="keys" 
          value="7">
          <p class="number p">7</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="8">
          <p class="number p">8</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="9">
          <p class="number p">9</p></button></div>
        <div class="delete-background"><button 
          id="keys" 
          class="numpad__text delete" 
          value="DEL">
          <p class="p">DEL</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="4">
          <p class="number p">4</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="5">
          <p class="number p">5</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="6">
          <p class="number p">6</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="+">
          <p class="symbol p">+</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="1">
          <p class="number p">1</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="2">
          <p class="number p">2</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="3">
          <p class="number p">3</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="-">
          <p class="symbol p">-</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value=".">
          <p class="symbol p">.</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="0">
          <p class="number p">0</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="/">
          <p class="symbol p">/</p></button></div>
        <div><button 
          id="keys" 
          class="keys" 
          value="*">
          <p class="symbol p">x</p></button></div>
        <div class="numpad__reset numpad__text delete-background"><button 
          id="keys" 
          class="delete" 
          value="AC">
          <p class="p">RESET</p></button></div>
        <div class="numpad__equals numpad__text"><button 
          id="keys" 
          class="equals" 
          value="=">
          <p class="p">=</p></button></div>
      </section>
    </main>
